<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Zorgkamer</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    width: 100vw;
    height: 100vh;
    overflow: hidden;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: #1a1a2e;
  }

  .scene {
    position: relative;
    width: 100%;
    height: 100%;
  }

  .bg {
    position: absolute;
    inset: 0;
    background: url('plaatje_clientkamer2.png') center center / cover no-repeat;
  }

  /* ── Klikbaar kussen ── */
  .pillow-hotspot {
    position: absolute;
    /* Positie van het blauwe kussen op de afbeelding */
    left: 66%;
    top: 60%;
    width: 10%;
    aspect-ratio: 1.6;
    cursor: pointer;
    border-radius: 50%;
    z-index: 10;
  }

  /* Zachte gloed eromheen */
  .pillow-hotspot::before {
    content: '';
    position: absolute;
    inset: -6px;
    border-radius: 50%;
    background: rgba(100, 180, 255, 0.25);
    animation: glow-pulse 2s ease-in-out infinite;
  }

  /* Drijvende animatie op het label */
  .pillow-label {
    position: absolute;
    bottom: calc(100% + 12px);
    left: 50%;
    transform: translateX(-50%);
    background: rgba(255,255,255,0.92);
    color: #1a5fa8;
    font-size: 13px;
    font-weight: 600;
    padding: 6px 14px;
    border-radius: 20px;
    white-space: nowrap;
    box-shadow: 0 4px 16px rgba(0,0,0,0.2);
    animation: float 2.8s ease-in-out infinite;
    pointer-events: none;
  }

  .pillow-label::after {
    content: '';
    position: absolute;
    top: 100%;
    left: 50%;
    transform: translateX(-50%);
    border: 6px solid transparent;
    border-top-color: rgba(255,255,255,0.92);
  }

  /* Play-icoon midden op hotspot */
  .pillow-play {
    position: absolute;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .pillow-play svg {
    width: 40%;
    height: 40%;
    filter: drop-shadow(0 2px 8px rgba(0,0,0,0.4));
    animation: float 2.8s ease-in-out infinite;
    transition: transform 0.2s;
  }

  .pillow-hotspot:hover .pillow-play svg {
    transform: scale(1.2);
  }

  @keyframes float {
    0%, 100% { transform: translateX(-50%) translateY(0); }
    50%       { transform: translateX(-50%) translateY(-6px); }
  }

  @keyframes float-icon {
    0%, 100% { transform: translateY(0); }
    50%       { transform: translateY(-6px); }
  }

  .pillow-play svg { animation: float-icon 2.8s ease-in-out infinite; }

  @keyframes glow-pulse {
    0%, 100% { opacity: 0.5; transform: scale(1); }
    50%       { opacity: 1;   transform: scale(1.12); }
  }

  /* ── Video modal ── */
  .modal-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.85);
    z-index: 999;
    align-items: center;
    justify-content: center;
    padding: 2rem;
    backdrop-filter: blur(6px);
  }

  .modal-overlay.open { display: flex; }

  .modal-box {
    background: #0d0d1a;
    border-radius: 18px;
    overflow: hidden;
    width: 100%;
    max-width: 720px;
    box-shadow: 0 30px 80px rgba(0,0,0,0.7);
    animation: popIn 0.25s ease;
  }

  @keyframes popIn {
    from { transform: scale(0.88) translateY(24px); opacity: 0; }
    to   { transform: scale(1) translateY(0);       opacity: 1; }
  }

  .modal-video {
    width: 100%;
    aspect-ratio: 16/9;
    border: none;
    display: block;
    background: #000;
  }

  .modal-footer {
    padding: 12px 16px 14px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 12px;
  }

  .modal-title {
    font-size: 13px;
    color: #aab8d8;
    font-weight: 500;
  }

  .close-btn {
    background: rgba(255,255,255,0.1);
    border: 1px solid rgba(255,255,255,0.18);
    border-radius: 20px;
    color: #ccc;
    font-size: 13px;
    padding: 6px 18px;
    cursor: pointer;
    transition: background 0.2s;
    white-space: nowrap;
  }

  .close-btn:hover { background: rgba(255,255,255,0.22); color: #fff; }

  /* Support-knop rechtsonder (zoals in de afbeelding) */
  .support-btn {
    position: fixed;
    bottom: 24px;
    right: 24px;
    display: flex;
    align-items: center;
    gap: 10px;
    background: linear-gradient(135deg, #1a8fe0, #0d6bb5);
    border-radius: 50px;
    padding: 10px 22px 10px 10px;
    box-shadow: 0 6px 24px rgba(0,100,200,0.35);
    cursor: pointer;
    z-index: 50;
    text-decoration: none;
    transition: transform 0.2s, box-shadow 0.2s;
  }

  .support-btn:hover {
    transform: translateY(-2px);
    box-shadow: 0 10px 32px rgba(0,100,200,0.5);
  }

  .support-avatar {
    width: 42px;
    height: 42px;
    border-radius: 50%;
    background: #fff;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 22px;
  }

  .support-text {
    font-size: 15px;
    font-weight: 700;
    color: #fff;
    letter-spacing: 0.04em;
  }

  /* ── Support chatvenster ── */
  .support-chat {
    display: none;
    position: fixed;
    bottom: 90px;
    right: 24px;
    width: 320px;
    background: #fff;
    border-radius: 18px;
    box-shadow: 0 12px 48px rgba(0,0,0,0.28);
    z-index: 200;
    overflow: hidden;
    animation: popIn 0.22s ease;
  }

  .support-chat.open { display: block; }

  .chat-header {
    background: linear-gradient(135deg, #1a8fe0, #0d6bb5);
    padding: 14px 18px;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  .chat-header-title {
    font-size: 15px;
    font-weight: 700;
    color: #fff;
  }

  .chat-header-sub {
    font-size: 11px;
    color: rgba(255,255,255,0.75);
    margin-top: 2px;
  }

  .chat-close {
    background: rgba(255,255,255,0.18);
    border: none;
    border-radius: 50%;
    width: 28px;
    height: 28px;
    cursor: pointer;
    color: #fff;
    font-size: 14px;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: background 0.2s;
    flex-shrink: 0;
  }

  .chat-close:hover { background: rgba(255,255,255,0.32); }

  .chat-body {
    padding: 18px 16px 16px;
  }

  .chat-question {
    font-size: 14px;
    font-weight: 600;
    color: #1a2a4a;
    margin-bottom: 10px;
  }

  .chat-textarea {
    width: 100%;
    height: 110px;
    border: 1.5px solid #d0daea;
    border-radius: 12px;
    padding: 10px 12px;
    font-size: 13px;
    font-family: inherit;
    color: #1a2a4a;
    resize: none;
    outline: none;
    transition: border-color 0.2s;
    line-height: 1.5;
  }

  .chat-textarea:focus { border-color: #1a8fe0; }
  .chat-textarea::placeholder { color: #aab4c8; }

  .chat-send {
    width: 100%;
    margin-top: 10px;
    background: linear-gradient(135deg, #1a8fe0, #0d6bb5);
    border: none;
    border-radius: 12px;
    color: #fff;
    font-size: 14px;
    font-weight: 600;
    padding: 11px;
    cursor: pointer;
    transition: opacity 0.2s, transform 0.15s;
    font-family: inherit;
  }

  .chat-send:hover { opacity: 0.9; transform: translateY(-1px); }
  .chat-send:active { transform: translateY(0); }

  .chat-sent-msg {
    display: none;
    text-align: center;
    padding: 24px 16px;
    color: #2a7a40;
    font-size: 14px;
    font-weight: 500;
  }

  .chat-sent-msg .checkmark {
    font-size: 36px;
    display: block;
    margin-bottom: 8px;
  }
</style>
</head>
<body>

<div class="scene">
  <div class="bg"></div>

  <!-- Klikbaar kussen -->
  <div class="pillow-hotspot" id="pillowBtn" title="Bekijk instructiefilmpje">
    <div class="pillow-label">▶ Bekijk instructiefilmpje</div>
    <div class="pillow-play">
      <svg viewBox="0 0 60 60" xmlns="http://www.w3.org/2000/svg">
        <circle cx="30" cy="30" r="29" fill="rgba(255,255,255,0.88)" stroke="rgba(100,160,255,0.5)" stroke-width="2"/>
        <polygon points="24,18 46,30 24,42" fill="#1a8fe0"/>
      </svg>
    </div>
  </div>

  <!-- Support knop -->
  <div class="support-btn" id="supportBtn">
    <div class="support-avatar">👩‍💼</div>
    <span class="support-text">SUPPORT</span>
  </div>
</div>

<!-- Support chatvenster -->
<div class="support-chat" id="supportChat">
  <div class="chat-header">
    <div>
      <div class="chat-header-title">👩‍💼 Support</div>
      <div class="chat-header-sub">Stuur een bericht naar ons team</div>
    </div>
    <button class="chat-close" id="chatClose">✕</button>
  </div>
  <div class="chat-body" id="chatBody">
    <p class="chat-question">Wat is je vraag?</p>
    <textarea class="chat-textarea" id="chatInput" placeholder="Typ hier je vraag..."></textarea>
    <button class="chat-send" id="chatSend">✉ Verstuur vraag</button>
  </div>
  <div class="chat-sent-msg" id="chatSent">
    <span class="checkmark">✅</span>
    Je vraag is verstuurd!<br>We nemen zo snel mogelijk contact op.
  </div>
</div>

<!-- Video modal -->
<div class="modal-overlay" id="modal">
  <div class="modal-box">
    <iframe
      class="modal-video"
      id="videoFrame"
      src=""
      allowfullscreen
      allow="autoplay; encrypted-media">
    </iframe>
    <div class="modal-footer">
      <span class="modal-title">Instructiefilmpje</span>
      <button class="close-btn" id="closeBtn">✕ Sluiten</button>
    </div>
  </div>
</div>

<script>
  // ── Video kussen ──
  const VIDEO_URL = 'https://share.google/3vTDAw6KGha3bEtjJ';
  const pillowBtn = document.getElementById('pillowBtn');
  const modal     = document.getElementById('modal');
  const frame     = document.getElementById('videoFrame');
  const closeBtn  = document.getElementById('closeBtn');

  pillowBtn.addEventListener('click', () => {
    window.open(VIDEO_URL, '_blank');
  });

  closeBtn.addEventListener('click', closeVideo);
  modal.addEventListener('click', e => { if (e.target === modal) closeVideo(); });
  document.addEventListener('keydown', e => { if (e.key === 'Escape') { closeVideo(); closeChat(); } });
  function closeVideo() { modal.classList.remove('open'); frame.src = ''; }

  // ── Support chat ──
  const supportBtn  = document.getElementById('supportBtn');
  const supportChat = document.getElementById('supportChat');
  const chatClose   = document.getElementById('chatClose');
  const chatSend    = document.getElementById('chatSend');
  const chatInput   = document.getElementById('chatInput');
  const chatBody    = document.getElementById('chatBody');
  const chatSent    = document.getElementById('chatSent');

  supportBtn.addEventListener('click', () => {
    supportChat.classList.toggle('open');
    if (supportChat.classList.contains('open')) chatInput.focus();
  });

  chatClose.addEventListener('click', closeChat);
  function closeChat() {
    supportChat.classList.remove('open');
    // Reset na sluiten
    setTimeout(() => {
      chatBody.style.display = '';
      chatSent.style.display = 'none';
      chatInput.value = '';
    }, 300);
  }

  chatSend.addEventListener('click', () => {
    const vraag = chatInput.value.trim();
    if (!vraag) { chatInput.focus(); return; }

    // Mailto — opent e-mailprogramma met vraag ingevuld
    const mailto = `mailto:mzalm@pluryn.nl`
      + `?subject=${encodeURIComponent('Supportvraag via zorgkamerpagina')}`
      + `&body=${encodeURIComponent(vraag)}`;
    window.location.href = mailto;

    // Toon bevestiging
    chatBody.style.display = 'none';
    chatSent.style.display = 'block';

    // Na 4 seconden automatisch sluiten
    setTimeout(closeChat, 4000);
  });
</script>

</body>
</html>
