<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Virtuele Kamerrondleiding</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/pannellum@2.5.6/build/pannellum.css"/>
<script src="https://cdn.jsdelivr.net/npm/pannellum@2.5.6/build/pannellum.js"></script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: #0b0c1a;
    height: 100vh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  #panorama {
    flex: 1;
    width: 100%;
  }

  /* Pannellum hotspot stijl overschrijven */
  .pnlm-hotspot-base {
    background: none !important;
  }

  .custom-hotspot {
    width: 48px;
    height: 48px;
    border-radius: 50%;
    background: rgba(255,255,255,0.92);
    display: flex;
    align-items: center;
    justify-content: center;
    box-shadow: 0 4px 18px rgba(0,0,0,0.35);
    cursor: pointer;
    animation: pulse 2.2s ease-in-out infinite;
    transition: transform 0.2s;
  }

  .custom-hotspot:hover { transform: scale(1.18); }

  .custom-hotspot svg {
    width: 22px;
    height: 22px;
  }

  @keyframes pulse {
    0%, 100% { box-shadow: 0 4px 18px rgba(0,0,0,0.35), 0 0 0 0 rgba(26,143,224,0.5); }
    50%       { box-shadow: 0 4px 18px rgba(0,0,0,0.35), 0 0 0 12px rgba(26,143,224,0); }
  }

  /* Modal */
  .modal-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.85);
    z-index: 999;
    align-items: center;
    justify-content: center;
    padding: 2rem;
    backdrop-filter: blur(6px);
  }

  .modal-overlay.open { display: flex; }

  .modal-box {
    background: #0d0d1a;
    border-radius: 18px;
    overflow: hidden;
    width: 100%;
    max-width: 680px;
    box-shadow: 0 30px 80px rgba(0,0,0,0.7);
    animation: popIn 0.22s ease;
  }

  @keyframes popIn {
    from { transform: scale(0.88) translateY(20px); opacity: 0; }
    to   { transform: scale(1) translateY(0);       opacity: 1; }
  }

  .modal-video {
    width: 100%;
    aspect-ratio: 16/9;
    border: none;
    display: block;
    background: #000;
  }

  .modal-info {
    padding: 18px 20px;
  }

  .modal-title {
    font-size: 16px;
    font-weight: 600;
    color: #e8eaf6;
    margin-bottom: 6px;
  }

  .modal-desc {
    font-size: 13px;
    color: #8a9dc0;
    line-height: 1.6;
  }

  .modal-footer {
    padding: 0 20px 16px;
    display: flex;
    justify-content: flex-end;
  }

  .close-btn {
    background: rgba(255,255,255,0.1);
    border: 1px solid rgba(255,255,255,0.18);
    border-radius: 20px;
    color: #ccc;
    font-size: 13px;
    padding: 7px 20px;
    cursor: pointer;
    transition: background 0.2s;
    font-family: inherit;
  }

  .close-btn:hover { background: rgba(255,255,255,0.22); color: #fff; }

  /* Info hotspot popup */
  .info-modal-box {
    max-width: 420px;
    padding: 28px;
  }

  .info-icon {
    font-size: 36px;
    margin-bottom: 12px;
  }

  /* Support knop */
  .support-btn {
    position: fixed;
    bottom: 24px;
    right: 24px;
    display: flex;
    align-items: center;
    gap: 10px;
    background: linear-gradient(135deg, #1a8fe0, #0d6bb5);
    border-radius: 50px;
    padding: 10px 22px 10px 10px;
    box-shadow: 0 6px 24px rgba(0,100,200,0.35);
    cursor: pointer;
    z-index: 50;
    transition: transform 0.2s, box-shadow 0.2s;
  }

  .support-btn:hover { transform: translateY(-2px); box-shadow: 0 10px 32px rgba(0,100,200,0.5); }
  .support-avatar { width: 42px; height: 42px; border-radius: 50%; background: #fff; display: flex; align-items: center; justify-content: center; font-size: 22px; }
  .support-text { font-size: 15px; font-weight: 700; color: #fff; letter-spacing: 0.04em; }

  /* Support chat */
  .support-chat {
    display: none;
    position: fixed;
    bottom: 90px;
    right: 24px;
    width: 320px;
    background: #fff;
    border-radius: 18px;
    box-shadow: 0 12px 48px rgba(0,0,0,0.28);
    z-index: 200;
    overflow: hidden;
    animation: popIn 0.22s ease;
  }

  .support-chat.open { display: block; }
  .chat-header { background: linear-gradient(135deg, #1a8fe0, #0d6bb5); padding: 14px 18px; display: flex; align-items: center; justify-content: space-between; }
  .chat-header-title { font-size: 15px; font-weight: 700; color: #fff; }
  .chat-header-sub { font-size: 11px; color: rgba(255,255,255,0.75); margin-top: 2px; }
  .chat-close { background: rgba(255,255,255,0.18); border: none; border-radius: 50%; width: 28px; height: 28px; cursor: pointer; color: #fff; font-size: 14px; display: flex; align-items: center; justify-content: center; transition: background 0.2s; }
  .chat-close:hover { background: rgba(255,255,255,0.32); }
  .chat-body { padding: 18px 16px 16px; }
  .chat-question { font-size: 14px; font-weight: 600; color: #1a2a4a; margin-bottom: 10px; }
  .chat-textarea { width: 100%; height: 100px; border: 1.5px solid #d0daea; border-radius: 12px; padding: 10px 12px; font-size: 13px; font-family: inherit; color: #1a2a4a; resize: none; outline: none; transition: border-color 0.2s; }
  .chat-textarea:focus { border-color: #1a8fe0; }
  .chat-send { width: 100%; margin-top: 10px; background: linear-gradient(135deg, #1a8fe0, #0d6bb5); border: none; border-radius: 12px; color: #fff; font-size: 14px; font-weight: 600; padding: 11px; cursor: pointer; font-family: inherit; transition: opacity 0.2s; }
  .chat-send:hover { opacity: 0.88; }
  .chat-sent-msg { display: none; text-align: center; padding: 24px 16px; color: #2a7a40; font-size: 14px; font-weight: 500; }
</style>
</head>
<body>

<div id="panorama"></div>

<!-- Video modal -->
<div class="modal-overlay" id="videoModal">
  <div class="modal-box">
    <iframe class="modal-video" id="videoFrame" src="" allowfullscreen allow="autoplay; encrypted-media"></iframe>
    <div class="modal-info">
      <div class="modal-title" id="videoTitle"></div>
      <div class="modal-desc" id="videoDesc"></div>
    </div>
    <div class="modal-footer">
      <button class="close-btn" id="videoClose">✕ Sluiten</button>
    </div>
  </div>
</div>

<!-- Info modal -->
<div class="modal-overlay" id="infoModal">
  <div class="modal-box info-modal-box">
    <div class="modal-info">
      <div class="info-icon" id="infoIcon"></div>
      <div class="modal-title" id="infoTitle"></div>
      <div class="modal-desc" id="infoDesc"></div>
    </div>
    <div class="modal-footer">
      <button class="close-btn" id="infoClose">✕ Sluiten</button>
    </div>
  </div>
</div>

<!-- Support -->
<div class="support-btn" id="supportBtn">
  <div class="support-avatar">👩‍💼</div>
  <span class="support-text">SUPPORT</span>
</div>

<div class="support-chat" id="supportChat">
  <div class="chat-header">
    <div>
      <div class="chat-header-title">👩‍💼 Support</div>
      <div class="chat-header-sub">Stuur een bericht naar ons team</div>
    </div>
    <button class="chat-close" id="chatClose">✕</button>
  </div>
  <div class="chat-body" id="chatBody">
    <p class="chat-question">Wat is je vraag?</p>
    <textarea class="chat-textarea" id="chatInput" placeholder="Typ hier je vraag..."></textarea>
    <button class="chat-send" id="chatSend">✉ Verstuur vraag</button>
  </div>
  <div class="chat-sent-msg" id="chatSent">✅ Je vraag is verstuurd!<br>We nemen snel contact op.</div>
</div>

  hotSpots: hotspots.map((h, i) => ({
    pitch: h.pitch,
    yaw: h.yaw,
    type: 'custom',
    cssClass: 'custom-hotspot-wrap',
    createTooltipFunc: (el) => createHotspot(el, h, i),
  })),
});

function createHotspot(el, h, i) {
  const div = document.createElement('div');
  div.className = 'custom-hotspot';
  div.title = h.title;

  if (h.icon === 'play') {
    div.innerHTML = `<svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
      <circle cx="12" cy="12" r="11" fill="#1a8fe0"/>
      <polygon points="10,8 18,12 10,16" fill="white"/>
    </svg>`;
  } else {
    div.style.fontSize = '22px';
    div.textContent = h.icon;
  }

  div.addEventListener('click', (e) => {
    e.stopPropagation();
    if (h.type === 'video') openVideo(h);
    else openInfo(h);
  });

  el.appendChild(div);
}

// ── Modals ────────────────────────────────────────────────────────────────
const videoModal = document.getElementById('videoModal');
const videoFrame = document.getElementById('videoFrame');
const videoTitle = document.getElementById('videoTitle');
const videoDesc  = document.getElementById('videoDesc');
const infoModal  = document.getElementById('infoModal');
const infoTitle  = document.getElementById('infoTitle');
const infoDesc   = document.getElementById('infoDesc');
const infoIcon   = document.getElementById('infoIcon');

function openVideo(h) {
  videoTitle.textContent = h.title;
  videoDesc.textContent  = h.desc;
  // Google Photos link → open nieuw tabblad
  window.open(h.url, '_blank');
  // Als YouTube: videoFrame.src = 'https://www.youtube.com/embed/ID?autoplay=1'; videoModal.classList.add('open');
}

function openInfo(h) {
  infoIcon.textContent  = h.icon;
  infoTitle.textContent = h.title;
  infoDesc.textContent  = h.desc;
  infoModal.classList.add('open');
}

document.getElementById('videoClose').addEventListener('click', () => { videoModal.classList.remove('open'); videoFrame.src = ''; });
document.getElementById('infoClose').addEventListener('click',  () => infoModal.classList.remove('open'));
videoModal.addEventListener('click', e => { if (e.target === videoModal) { videoModal.classList.remove('open'); videoFrame.src = ''; } });
infoModal.addEventListener('click',  e => { if (e.target === infoModal) infoModal.classList.remove('open'); });
document.addEventListener('keydown', e => { if (e.key === 'Escape') { videoModal.classList.remove('open'); videoFrame.src=''; infoModal.classList.remove('open'); } });

// ── Support chat ──────────────────────────────────────────────────────────
const supportBtn  = document.getElementById('supportBtn');
const supportChat = document.getElementById('supportChat');
const chatClose   = document.getElementById('chatClose');
const chatSend    = document.getElementById('chatSend');
const chatInput   = document.getElementById('chatInput');
const chatBody    = document.getElementById('chatBody');
const chatSent    = document.getElementById('chatSent');

supportBtn.addEventListener('mouseenter', () => { supportChat.classList.add('open'); chatInput.focus(); });
supportBtn.addEventListener('click', () => supportChat.classList.toggle('open'));

function closeChat() {
  supportChat.classList.remove('open');
  setTimeout(() => { chatBody.style.display = ''; chatSent.style.display = 'none'; chatInput.value = ''; }, 300);
}

chatClose.addEventListener('click', closeChat);

chatSend.addEventListener('click', () => {
  const vraag = chatInput.value.trim();
  if (!vraag) { chatInput.focus(); return; }
  const mailto = `mailto:mzalm@pluryn.nl?subject=${encodeURIComponent('Supportvraag via zorgkamerpagina')}&body=${encodeURIComponent(vraag)}`;
  window.location.href = mailto;
  chatBody.style.display = 'none';
  chatSent.style.display = 'block';
  setTimeout(closeChat, 4000);
});
</script>
